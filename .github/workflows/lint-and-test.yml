name: Lint and Test

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install ruff pytest pytest-asyncio pytest-homeassistant-custom-component pyimouapi aiohttp
      - name: Ruff lint
        run: ruff check .
      - name: Run tests
        run: pytest tests/ -x -q
